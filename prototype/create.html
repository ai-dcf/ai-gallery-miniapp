<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>创建图片 - AI画廊</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: '#0052D9',
        'brand-light': '#E8F0FE',
        'brand-hover': '#003CAB',
        'td-bg': '#F5F5F5',
        'td-card': '#FFFFFF',
        'td-text': '#1a1a1a',
        'td-text-secondary': '#999999',
        'td-text-placeholder': '#BBBBBB',
        'td-border': '#E7E7E7',
        'td-success': '#00A870',
        'td-warning': '#ED7B2F',
        'td-danger': '#D54941',
      },
      fontFamily: {
        sans: ['Noto Sans SC', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC', sans-serif; background: #F5F5F5; overflow-x: hidden; }
  ::-webkit-scrollbar { display: none; }

  .state-toggle {
    position: fixed; top: 8px; right: 8px; z-index: 200;
    background: rgba(0,82,217,0.12); color: #0052D9;
    font-size: 10px; padding: 4px 10px; border-radius: 12px;
    cursor: pointer; border: 1px solid rgba(0,82,217,0.2);
    transition: all 0.2s;
  }
  .state-toggle:active { transform: scale(0.95); }

  .tag-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 12px; border-radius: 16px; font-size: 12px;
    background: #F5F5F5; color: #666; border: 1px solid #E7E7E7;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .tag-btn:active, .tag-btn.selected {
    background: #E8F0FE; color: #0052D9; border-color: rgba(0,82,217,0.3);
  }

  @keyframes pulse-ring {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, #E7E7E7 25%, #F5F5F5 50%, #E7E7E7 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  .pulse-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid #0052D9; animation: pulse-ring 1.2s ease-out infinite;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
  .fade-in { animation: fadeIn 0.4s ease both; }
</style>
</head>
<body class="bg-td-bg min-h-screen">

  <div class="state-toggle" id="toggleBtn" onclick="toggleState()">切换: 输入 → 生成中 → 完成</div>

  <div class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-td-border">
    <div class="flex items-center px-4 h-11">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"><path d="M15 19l-7-7 7-7"/></svg>
      <h1 class="flex-1 text-center text-base font-bold text-td-text -ml-5">创建图片</h1>
    </div>
  </div>

  <!-- STATE 1: 输入提示词 -->
  <div id="stateInput" class="px-4 pt-4 pb-6">
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <div class="flex items-center gap-2 mb-3">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0052D9" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
        <span class="text-sm font-bold text-td-text">描述你想要的画面</span>
      </div>
      <textarea
        class="w-full h-28 bg-td-bg rounded-lg p-3 text-sm text-td-text resize-none outline-none border border-td-border focus:border-brand transition-colors placeholder:text-td-text-placeholder"
        placeholder="试试描述：主角 + 在哪里 + 做什么 + 像什么风格？&#10;例如：一只橘猫在窗台上看夕阳，油画风格"
      ></textarea>

      <div class="mt-3">
        <p class="text-[10px] text-td-text-secondary mb-2">常用风格（点击添加）</p>
        <div class="flex flex-wrap gap-2">
          <span class="tag-btn">🎨 写实</span>
          <span class="tag-btn selected">🌸 动漫</span>
          <span class="tag-btn">🎬 电影感</span>
          <span class="tag-btn">✨ 梦幻</span>
          <span class="tag-btn">🖌️ 油画</span>
          <span class="tag-btn">💧 水彩</span>
        </div>
      </div>

      <div class="mt-3">
        <p class="text-[10px] text-td-text-secondary mb-2">不希望出现的内容（可选）</p>
        <input
          class="w-full h-9 bg-td-bg rounded-lg px-3 text-sm text-td-text outline-none border border-td-border focus:border-brand transition-colors placeholder:text-td-text-placeholder"
          placeholder="例如：不要文字、不要模糊"
        >
      </div>

      <div class="mt-3 flex items-center gap-2">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ED7B2F" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        <span class="text-[10px] text-td-warning">灵感推荐</span>
        <span class="text-[10px] text-td-text-secondary">查看优质提示词和范例图片</span>
      </div>
    </div>

    <button class="w-full mt-4 h-12 bg-brand text-white text-sm font-bold rounded-xl flex items-center justify-center gap-2 active:bg-brand-hover transition-colors shadow-lg shadow-brand/20" onclick="toggleState()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      生成图片
    </button>
  </div>

  <!-- STATE 2: 生成中 -->
  <div id="stateGenerating" class="px-4 pt-4 pb-6" style="display:none;">
    <div class="bg-white rounded-xl p-6 shadow-sm flex flex-col items-center">
      <div class="relative w-16 h-16 mb-5">
        <div class="pulse-ring"></div>
        <div class="w-16 h-16 rounded-full bg-brand-light flex items-center justify-center">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0052D9" stroke-width="2" stroke-linecap="round"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
      </div>
      <p class="text-base font-bold text-td-text mb-1">AI 正在创作中...</p>
      <p class="text-xs text-td-text-secondary mb-5">预计需要 10-30 秒，请耐心等待</p>

      <div class="w-full h-48 bg-td-bg rounded-xl overflow-hidden shimmer relative">
        <div class="absolute inset-0 flex items-center justify-center">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="1.2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </div>
      </div>

      <div class="w-full mt-4 bg-td-bg rounded-full h-1.5 overflow-hidden">
        <div class="h-full bg-brand rounded-full" style="width:65%; transition: width 0.3s;"></div>
      </div>
      <p class="text-[10px] text-td-text-secondary mt-2">生成进度 65%</p>
    </div>
  </div>

  <!-- STATE 3: 生成完成 -->
  <div id="stateComplete" class="px-4 pt-4 pb-6" style="display:none;">
    <div class="bg-white rounded-xl p-4 shadow-sm fade-in">
      <div class="flex items-center gap-2 mb-3">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00A870" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        <span class="text-sm font-bold text-td-success">生成完成</span>
      </div>

      <div class="rounded-xl overflow-hidden shadow-md">
        <img src="https://picsum.photos/800/800?random=99" class="w-full aspect-square object-cover" alt="AI生成的图片">
      </div>

      <div class="mt-3 bg-td-bg rounded-lg p-3">
        <p class="text-[10px] text-td-text-secondary mb-1">提示词</p>
        <p class="text-xs text-td-text leading-relaxed">一只橘猫坐在窗台上，望着窗外的夕阳，油画风格，动漫，梦幻</p>
      </div>

      <div class="flex gap-3 mt-4">
        <button class="flex-1 h-11 border border-td-border text-td-text text-sm font-medium rounded-xl flex items-center justify-center gap-2 active:bg-td-bg transition-colors">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          重新生成
        </button>
        <button class="flex-1 h-11 bg-td-success text-white text-sm font-bold rounded-xl flex items-center justify-center gap-2 active:opacity-90 transition-opacity shadow-lg shadow-td-success/20">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          发布
        </button>
      </div>
    </div>

    <div class="mt-3 bg-brand-light rounded-xl p-3 flex items-center gap-2 fade-in" style="animation-delay:0.15s">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0052D9" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span class="text-[11px] text-brand">发布后图片将出现在首页画廊，所有用户可见</span>
    </div>
  </div>

  <script>
    let currentState = 0;
    const states = ['stateInput', 'stateGenerating', 'stateComplete'];
    const labels = ['切换: 输入 → 生成中 → 完成', '切换: 输入 → 生成中 → 完成', '切换: 输入 → 生成中 → 完成'];

    function toggleState() {
      states.forEach(id => document.getElementById(id).style.display = 'none');
      currentState = (currentState + 1) % 3;
      document.getElementById(states[currentState]).style.display = 'block';
      const idx = currentState;
      const markers = ['输入', '生成中', '完成'];
      document.getElementById('toggleBtn').textContent = '当前: ' + markers[idx] + ' (点击切换)';
    }
  </script>
</body>
</html>
