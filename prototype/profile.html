<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的 - AI画廊</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: '#0052D9',
        'brand-light': '#E8F0FE',
        'brand-hover': '#003CAB',
        'td-bg': '#F5F5F5',
        'td-card': '#FFFFFF',
        'td-text': '#1a1a1a',
        'td-text-secondary': '#999999',
        'td-text-placeholder': '#BBBBBB',
        'td-border': '#E7E7E7',
        'td-success': '#00A870',
        'td-warning': '#ED7B2F',
        'td-danger': '#D54941',
      },
      fontFamily: {
        sans: ['Noto Sans SC', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC', sans-serif; background: #F5F5F5; overflow-x: hidden; }
  ::-webkit-scrollbar { display: none; }

  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 64px; background: white;
    border-top: 0.5px solid #E7E7E7;
    display: flex; align-items: center; justify-content: space-around;
    z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10px; color: #999; cursor: pointer; transition: color 0.15s;
  }
  .tab-item.active { color: #0052D9; }
  .tab-item svg { width: 24px; height: 24px; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.35s ease both; }

  .state-toggle {
    position: fixed; top: 8px; right: 8px; z-index: 200;
    background: rgba(0,82,217,0.12); color: #0052D9;
    font-size: 10px; padding: 4px 10px; border-radius: 12px;
    cursor: pointer; border: 1px solid rgba(0,82,217,0.2);
    transition: all 0.2s;
  }
  .state-toggle:active { transform: scale(0.95); }
</style>
</head>
<body class="bg-td-bg min-h-screen">

  <div class="state-toggle" id="toggleBtn" onclick="toggleState()">切换: 未登录 / 已登录</div>

  <div id="notLoggedIn" class="pb-20">
    <div class="bg-white px-5 pt-14 pb-8 flex flex-col items-center">
      <div class="w-20 h-20 rounded-full bg-td-border flex items-center justify-center mb-4">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </div>
      <p class="text-sm text-td-text-secondary mb-5">登录后查看个人画廊</p>
      <button class="w-full max-w-[260px] h-11 bg-brand text-white text-sm font-medium rounded-lg flex items-center justify-center gap-2 active:bg-brand-hover transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991a.96.96 0 110 1.92.96.96 0 010-1.92zm5.812 0a.96.96 0 110 1.92.96.96 0 010-1.92z"/><path d="M23.96 14.853c0-3.259-3.27-5.903-7.3-5.903s-7.3 2.644-7.3 5.903 3.27 5.903 7.3 5.903c.856 0 1.681-.123 2.454-.35a.722.722 0 01.595.083l1.58.925a.272.272 0 00.14.045.247.247 0 00.241-.247c0-.06-.024-.118-.04-.177l-.325-1.233a.49.49 0 01.177-.556c1.52-1.12 2.478-2.776 2.478-4.393zm-9.966-1.052a.8.8 0 110 1.6.8.8 0 010-1.6zm5.332 0a.8.8 0 110 1.6.8.8 0 010-1.6z"/></svg>
        微信一键登录
      </button>
    </div>

    <div class="mt-3 mx-4 bg-white rounded-lg p-5">
      <div class="flex items-center justify-center py-10">
        <div class="text-center">
          <svg class="mx-auto mb-3" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D5D5D5" stroke-width="1.2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <p class="text-xs text-td-text-placeholder">登录后查看你的个人画廊</p>
        </div>
      </div>
    </div>
  </div>

  <div id="loggedIn" class="pb-20" style="display:none;">
    <div class="bg-gradient-to-b from-brand to-blue-600 px-5 pt-14 pb-10">
      <div class="flex items-center gap-4">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Alex&backgroundColor=E8F0FE" class="w-16 h-16 rounded-full border-2 border-white/30" alt="avatar">
        <div>
          <h2 class="text-white text-lg font-bold">Alex 创作者</h2>
          <p class="text-blue-100 text-xs mt-0.5">用 AI 描绘想象中的世界</p>
        </div>
      </div>
      <div class="flex gap-8 mt-5">
        <div class="text-center">
          <p class="text-white text-xl font-bold">12</p>
          <p class="text-blue-100 text-[10px] mt-0.5">作品</p>
        </div>
        <div class="text-center">
          <p class="text-white text-xl font-bold">36</p>
          <p class="text-blue-100 text-[10px] mt-0.5">获赞</p>
        </div>
        <div class="text-center">
          <p class="text-white text-xl font-bold">5</p>
          <p class="text-blue-100 text-[10px] mt-0.5">收藏</p>
        </div>
      </div>
    </div>

    <div class="mx-4 -mt-4 bg-white rounded-xl p-4 shadow-sm fade-in">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-bold text-td-text">个人画廊</h3>
        <span class="text-[10px] text-brand">查看全部</span>
      </div>
      <div class="grid grid-cols-3 gap-2">
        <div class="rounded-lg overflow-hidden aspect-square">
          <img src="https://picsum.photos/300/300?random=10" class="w-full h-full object-cover" alt="">
        </div>
        <div class="rounded-lg overflow-hidden aspect-square">
          <img src="https://picsum.photos/300/300?random=11" class="w-full h-full object-cover" alt="">
        </div>
        <div class="rounded-lg overflow-hidden aspect-square">
          <img src="https://picsum.photos/300/300?random=12" class="w-full h-full object-cover" alt="">
        </div>
        <div class="rounded-lg overflow-hidden aspect-square">
          <img src="https://picsum.photos/300/300?random=13" class="w-full h-full object-cover" alt="">
        </div>
        <div class="rounded-lg overflow-hidden aspect-square">
          <img src="https://picsum.photos/300/300?random=14" class="w-full h-full object-cover" alt="">
        </div>
        <div class="rounded-lg overflow-hidden aspect-square">
          <img src="https://picsum.photos/300/300?random=15" class="w-full h-full object-cover" alt="">
        </div>
        <div class="rounded-lg overflow-hidden aspect-square">
          <img src="https://picsum.photos/300/300?random=16" class="w-full h-full object-cover" alt="">
        </div>
        <div class="rounded-lg overflow-hidden aspect-square">
          <img src="https://picsum.photos/300/300?random=17" class="w-full h-full object-cover" alt="">
        </div>
        <div class="rounded-lg overflow-hidden aspect-square bg-td-bg flex items-center justify-center">
          <div class="text-center">
            <svg class="mx-auto" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#BBBBBB" stroke-width="1.5"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
            <p class="text-[10px] text-td-text-placeholder mt-1">更多</p>
          </div>
        </div>
      </div>
    </div>

    <div class="mx-4 mt-3 bg-white rounded-xl p-4 shadow-sm fade-in" style="animation-delay:0.1s">
      <div class="flex items-center justify-between py-2.5 border-b border-td-border">
        <div class="flex items-center gap-3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="text-sm text-td-text">创作历史</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="2"><path stroke-linecap="round" d="M9 5l7 7-7 7"/></svg>
      </div>
      <div class="flex items-center justify-between py-2.5 border-b border-td-border">
        <div class="flex items-center gap-3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <span class="text-sm text-td-text">隐私设置</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="2"><path stroke-linecap="round" d="M9 5l7 7-7 7"/></svg>
      </div>
      <div class="flex items-center justify-between py-2.5">
        <div class="flex items-center gap-3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="text-sm text-td-text">帮助与反馈</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CCCCCC" stroke-width="2"><path stroke-linecap="round" d="M9 5l7 7-7 7"/></svg>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <span>我的</span>
    </div>
  </div>

  <script>
    let isLogged = false;
    function toggleState() {
      isLogged = !isLogged;
      document.getElementById('notLoggedIn').style.display = isLogged ? 'none' : 'block';
      document.getElementById('loggedIn').style.display = isLogged ? 'block' : 'none';
      document.getElementById('toggleBtn').textContent = isLogged ? '切换: 未登录 / 已登录 ✓' : '切换: 未登录 / 已登录';
    }
  </script>
</body>
</html>
